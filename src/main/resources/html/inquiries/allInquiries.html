<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fog - Mine Forespørgsler</title>

    <script th:src="@{/js/partsListPopup.js}" defer></script>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/myInquiries.css}">
</head>


<body>
<div th:replace="~{templates/header.html :: header}"></div>

<h1>Alle Forespørgsler</h1>

<!-- Hvis listen er tom -->
<div th:if="${#lists.isEmpty(session.inquiryList)}" class="empty-message">
    Ingen forespørgsler fundet.
</div>

<!-- Grid med carporte -->
<div class="inquiry-grid" th:if="${not #lists.isEmpty(session.inquiryList)}">

    <div class="inquiry-card"
         th:each="inquiry : ${session.inquiryList}">

        <div class="inquiry-title"
             th:text="${inquiry.inquiryId}">
            Foresprøgsel navn
        </div>

        <div class="inquiry-info">
            <strong>Status:</strong>
            <span th:text="${inquiry.status}">null</span>
        </div>

        <div class="inquiry-info">
            <strong>Udkast dato:</strong>
            <span th:text="${inquiry.date}">xx-xx-xxxx</span>
        </div>

        <div class="delete-partslist-btn-group">
        <form th:action="@{/admin/deleteInquiry}" method="post">
            <input type="hidden"
                   name="selectedInquiryId"
                   th:value="${inquiry.inquiryId}" />

            <button type="submit" class="delete-btn">
                Slet inquiry
            </button>

        </form>

        <form th:action="@{/user/generatePartsList}"
              method="post"
              class="partsList-form">

            <input type="hidden"
                   name="selectedCarportId"
                   th:value="${inquiry.carportId}"/>
            <button type="submit" class="partsList-btn">
                Stykliste
            </button>
        </form>
        </div>

        <div class="email-carport-btn-group">
        <form th:action="@{/admin/seeCustomerInfo}" method="post">
            <input type="hidden"
                   name="selectedInquiryId"
                   th:value="${inquiry.inquiryId}" />

            <button type="submit" class="email-btn">
                Vis Kunde Info
            </button>
        </form>
        <form th:action="@{/admin/seeCarportUnderInquiries}" method="post">

            <input type="hidden"
                   name="selectedCarportId"
                   th:value="${inquiry.carportId}" />

            <button type="submit" class="see-btn">
                Se carport
            </button>

        </form>
        </div>

        <form th:action="@{/admin/setInquiryStatus}" method="post" class="status-form">

            <input type="hidden"
                   name="selectedInquiryId"
                   th:value="${inquiry.inquiryId}" />

            <select name="setInquiryStatus">
                <option value="Venter"
                        th:selected="${inquiry.status == 'Venter'}">Venter</option>
                <option value="Afvist"
                        th:selected="${inquiry.status == 'Afvist'}">Afvist</option>
                <option value="Godkendt"
                        th:selected="${inquiry.status == 'Godkendt'}">Godkendt</option>
            </select>

            <button type="submit" class="status-btn">
                Ændre status
            </button>

        </form>
    </div>

</div>


<div id="emailModal" class="modal" th:if="${session.customerEmail != null}">
    <div class="modal-content">
        <h2>Kundens Info</h2>
        <p th:text="'Kundenummer: ' + ${session.customerId}"></p>
        <p th:text="'Email: ' + ${session.customerEmail}"></p>
        <p th:text="'Navn: ' + ${session.customerFirstName} + ' ' + ${session.customerLastName}"></p>
        <p th:text="'Telefonnummer: ' + ${session.customerPhoneNumber}"></p>

        <button onclick="closeModal()" class="modal-close-btn">
            Luk
        </button>
    </div>
</div>

<script th:if="${session.customerEmail != null}">
    function closeModal() {
        document.getElementById("emailModal").style.display = "none";
    }

    window.onload = function () {
        document.getElementById("emailModal").style.display = "flex";
    };
</script>


<div id="carportModal"
     class="modal"
     th:if="${session.selectedCarport != null}">

    <div class="modal-content">

        <h2>Kundens Carport Design</h2>

        <div class="detail-row">
            <strong>Antal biler:</strong>
            <span th:text="${session.selectedCarport.amountOfCars}"></span>
        </div>

        <div class="detail-row">
            <strong>Længde:</strong>
            <span th:text="${session.selectedCarport.length}"></span>
            cm
        </div>

        <div class="detail-row">
            <strong>Bredde:</strong>
            <span th:text="${session.selectedCarport.width}"></span>
            cm
        </div>

        <div class="detail-row">
            <strong>Redskabsskur:</strong>
            <span th:text="${session.selectedCarport.hasShed ? 'Ja' : 'Nej'}"></span>
        </div>

        <div th:if="${session.selectedCarport.hasShed}">

            <div class="detail-row">
                <strong>Skur længde:</strong>
                <span th:text="${session.selectedCarport.shedLength}"></span>
                cm
            </div>

            <div class="detail-row">
                <strong>Skur bredde:</strong>
                <span th:text="${session.selectedCarport.shedWidth}"></span>
                cm
            </div>

        </div>

        <div class="detail-row">
            <strong>Tagrender:</strong>
            <span th:text="${session.selectedCarport.hasGutter ? 'Ja' : 'Nej'}"></span>
        </div>

        <div class="detail-row">
            <strong>Kunde bemærkning:</strong>
            <span th:text="${session.selectedCarport.notes}"></span>
        </div>

        <button onclick="closeCarportModal()" class="modal-close-btn">
            Luk
        </button>

    </div>
</div>

<script th:if="${session.selectedCarport != null}">

    function closeCarportModal() {
        document.getElementById("carportModal").style.display = "none";
    }

    window.onload = function () {
        document.getElementById("carportModal").style.display = "flex";
    };

</script>

</body>

<footer>
    <div th:replace="~{templates/footer.html :: footer}"></div>
</footer>

</html>
