<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fog - Gemte Carporte</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/myCarports.css}">
</head>

<div th:replace="~{templates/header.html :: header}"></div>

<body>
<h1>Mine Carporte</h1>

<!-- Hvis listen er tom -->
<div th:if="${#lists.isEmpty(session.carportList)}" class="empty-message">
    Ingen carporte fundet.
</div>

<!-- Grid med carporte -->
<div class="carport-grid" th:if="${not #lists.isEmpty(session.carportList)}">

    <div class="carport-card"
         th:each="carport : ${session.carportList}">

        <div class="carport-title"
             th:text="${carport.carportId}">
            Carport navn
        </div>

        <div class="carport-info">
            <strong>Længde:</strong>
            <span th:text="${carport.length}">600</span> cm
        </div>

        <div class="carport-info">
            <strong>Bredde:</strong>
            <span th:text="${carport.width}">780</span> cm
        </div>

        <div class="button-group">

            <!-- Edit knap -->
            <form th:if="${carport.canEdit}"
                  th:action="@{/user/editCarport}" method="get">
                <input type="hidden"
                       name="selectedCarportId"
                       th:value="${carport.carportId}"/>

                <button type="button"
                        class="edit-btn"
                        th:onclick="'openPopup('
        + ${carport.carportId} + ','
        + ${carport.width} + ','
        + ${carport.length} + ','
        + ${carport.hasShed} + ','
        + ${carport.shedLength} + ','
        + ${carport.shedWidth} + ','
        + ${carport.hasGutter}
        + ')'">
                    Edit
                </button>
            </form>

            <form th:if="${carport.canEdit}"
                  th:action="@{/user/deleteCarport}"
                  method="post">

                <input type="hidden"
                       name="selectedCarportId"
                       th:value="${carport.carportId}"/>

                <button type="submit" class="delete-btn">
                    Slet carport
                </button>

            </form>

        </div>

    </div>

</div>

<div id="editPopup" class="popup-overlay">

    <div class="popup-content">

        <span class="close-btn" onclick="closePopup()">
            &times;
        </span>

        <h2>Edit Carport</h2>

        <form th:action="@{/user/editCarport}" method="post">

            <input type="hidden"
                   id="popupCarportId"
                   name="carportId">

            <div class="popup-form">
            <label>Bredde</label>

            <select id="popupWidth" name="width">
                <option value="">Vælg bredde</option>
                <option value="240">240 cm</option>
                <option value="270">270 cm</option>
                <option value="300">300 cm</option>
                <option value="330">330 cm</option>
                <option value="360">360 cm</option>
                <option value="390">390 cm</option>
                <option value="420">420 cm</option>
                <option value="450">450 cm</option>
                <option value="480">480 cm</option>
                <option value="510">510 cm</option>
                <option value="540">540 cm</option>
                <option value="570">570 cm</option>
                <option value="600">600 cm</option>
            </select>
            </div>

            <div class="popup-form">
            <label>Længde</label>

            <select id="popupLength" name="length">
                <option value="">Vælg længde</option>
                <option value="240">240 cm</option>
                <option value="270">270 cm</option>
                <option value="300">300 cm</option>
                <option value="330">330 cm</option>
                <option value="360">360 cm</option>
                <option value="390">390 cm</option>
                <option value="420">420 cm</option>
                <option value="450">450 cm</option>
                <option value="480">480 cm</option>
                <option value="510">510 cm</option>
                <option value="540">540 cm</option>
                <option value="570">570 cm</option>
                <option value="600">600 cm</option>
                <option value="630">630 cm</option>
                <option value="660">660 cm</option>
                <option value="690">690 cm</option>
                <option value="720">720 cm</option>
                <option value="750">750 cm</option>
                <option value="780">780 cm</option>
            </select>
            </div>

            <div class="popup-form">
            <label>Har skur</label>

            <select id="popupHasShed" name="hasShed">
                <option value="true">Ja</option>
                <option value="false">Nej</option>
            </select>
            </div>

            <div class="popup-form">
            <label>Skur længde</label>

            <select id="popupShedLength" name="shedLength">
                <option value="0">Ingen</option>
                <option value="150">210 cm</option>
                <option value="180">240 cm</option>
                <option value="210">210 cm</option>
                <option value="240">240 cm</option>
                <option value="270">270 cm</option>
                <option value="300">300 cm</option>
                <option value="330">330 cm</option>
                <option value="360">360 cm</option>
                <option value="390">390 cm</option>
                <option value="420">420 cm</option>
                <option value="450">450 cm</option>
                <option value="480">480 cm</option>
                <option value="510">510 cm</option>
                <option value="540">540 cm</option>
                <option value="570">570 cm</option>
                <option value="600">600 cm</option>
                <option value="630">630 cm</option>
                <option value="660">660 cm</option>
                <option value="690">690 cm</option>
            </select>
            </div>

            <div class="popup-form">
            <label>Skur bredde</label>

            <select id="popupShedWidth" name="shedWidth">
                <option value="0">Vælg bredde</option>
                <option value="210">210 cm</option>
                <option value="240">240 cm</option>
                <option value="270">270 cm</option>
                <option value="300">300 cm</option>
                <option value="330">330 cm</option>
                <option value="360">360 cm</option>
                <option value="390">390 cm</option>
                <option value="420">420 cm</option>
                <option value="450">450 cm</option>
                <option value="480">480 cm</option>
                <option value="510">510 cm</option>
                <option value="540">540 cm</option>
                <option value="570">570 cm</option>
                <option value="600">600 cm</option>
                <option value="630">630 cm</option>
                <option value="660">660 cm</option>
                <option value="690">690 cm</option>
                <option value="720">720 cm</option>
            </select>
            </div>

            <div class="popup-form">
            <label>Tagrende</label>

            <select id="popupHasGutter" name="hasGutter">
                <option value="true">Ja</option>
                <option value="false">Nej</option>
            </select>
            </div>

            <button type="submit">
                Gem ændringer
            </button>

        </form>

    </div>

</div>

<script>
    function openPopup(id, width, length, hasShed, shedLength, shedWidth, hasGutter) {

        document.getElementById("popupCarportId").value = id;

        document.getElementById("popupWidth").value = width;
        document.getElementById("popupLength").value = length;

        document.getElementById("popupHasShed").value = hasShed;
        document.getElementById("popupShedLength").value = shedLength;
        document.getElementById("popupShedWidth").value = shedWidth;

        document.getElementById("popupHasGutter").value = hasGutter;

        document.getElementById("editPopup").style.display = "flex";
    }

    function closePopup() {
        document.getElementById("editPopup").style.display = "none";
    }
</script>

</body>

<footer>
    <div th:replace="~{templates/footer.html :: footer}"></div>
</footer>

</html>
